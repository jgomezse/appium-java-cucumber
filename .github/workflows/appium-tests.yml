name: Appium Tests

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  android-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 17

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm install -g appium
      - run: appium driver install uiautomator2

      - name: Start Appium server
        run: |
          appium &
          echo "Waiting for Appium..."
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:4723/status > /dev/null 2>&1; then
              echo "Appium ready"
              exit 0
            fi
            sleep 2
          done
          echo "Appium failed to start"
          exit 1

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          avd-name: Medium_Phone_API_36
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            ./gradlew clean test allureReport --continue --info

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: allure-report
          path: build/reports/allure-report/allureReport

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cucumber-report
          path: build/reports/cucumber/cucumber.html

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cucumber-json-report
          path: build/reports/cucumber/cucumber.json
